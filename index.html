<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Eifelgemüse - Kleines Grün. Große Wirkung.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
      :root {
        --eifel-green: #1a4d2e;
        --eifel-sage: #88a270;
        --eifel-beige: #fdfaf3;
        --eifel-clay: #f2ede1;
        --eifel-black: #121a14;
      }
      body {
        font-family: 'Inter', sans-serif;
        background-color: var(--eifel-beige);
        color: var(--eifel-black);
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
        margin: 0;
      }
      .bg-eifel-green { background-color: var(--eifel-green); }
      .text-eifel-green { color: var(--eifel-green); }
      
      .transition-all { transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
      
      ::-webkit-scrollbar { width: 10px; }
      ::-webkit-scrollbar-track { background: var(--eifel-beige); }
      ::-webkit-scrollbar-thumb { background: #dcd7c5; border-radius: 20px; border: 3px solid var(--eifel-beige); }

      .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
